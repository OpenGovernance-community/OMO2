<VirtualHost *:80>
    ServerName localhost
    ServerAlias *.localhost localtest.me *.localtest.me omo.test *.omo.test
    UseCanonicalName Off

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName localhost
    ServerAlias *.localhost localtest.me *.localtest.me omo.test *.omo.test
    UseCanonicalName Off

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Options FollowSymLinks
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/dev-localhost.crt
    SSLCertificateKeyFile /etc/apache2/ssl/dev-localhost.key

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
</IfModule>
